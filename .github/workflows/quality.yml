name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ADMIN_BOOTSTRAP_EMAIL: admin@example.com
      ADMIN_BOOTSTRAP_NAME: CI Admin
      ADMIN_BOOTSTRAP_PASSWORD: ci-admin-password-12345
      AUTH_SECRET: ci-auth-secret-for-quality-workflow
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aphrodite?schema=public

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aphrodite
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aphrodite"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: E2E
        run: pnpm e2e
